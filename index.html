<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cats Lock — macOS keyboard lock for cat owners</title>
<meta name="description" content="A macOS utility that locks your keyboard when a cat approaches.">
<style>
  :root {
    --bg: #FEF8EF;
    --accent: #E8A838;
    --text: #2E2A26;
    --muted: #6B655F;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 17px/1.6 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--text);
    background: var(--bg);
    text-align: center;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 24px 48px;
  }
  img.hero {
    width: 100%;
    max-width: 480px;
    height: auto;
    display: block;
    margin: 0 auto 32px;
  }
  h1 {
    font-size: 2.4rem;
    margin: 0 0 12px;
    letter-spacing: -0.02em;
  }
  p.tagline {
    font-size: 1.15rem;
    color: var(--muted);
    margin: 0 0 40px;
  }
  .soon {
    display: inline-block;
    background: var(--accent);
    color: white;
    padding: 12px 24px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid rgba(0,0,0,0.08);
    color: var(--muted);
    font-size: 0.9rem;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<main>
  <img class="hero" src="mascot_keycap_1024.png" alt="Cats Lock keycap logo">
  <h1>Cats Lock</h1>
  <p class="tagline">Paws off my keyboard. A playful macOS utility that locks your keyboard when a cat approaches.</p>
  <span class="soon">Coming soon to the Mac App Store</span>
  <footer>
    <a href="/privacy.html">Privacy Policy</a> · <a href="mailto:meow@catslock.app">meow@catslock.app</a> · © 2026 Cats Lock
  </footer>
</main>
</body>
</html>
